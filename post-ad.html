<script>
// 1. Initialize Supabase Connection
const SUPABASE_URL = "https://iyhmqmlcrypjbfhwbnjk.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5aG1xbWxjcnlwamJmaHdibmprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTMzOTMsImV4cCI6MjA5NTU4OTM5M30.FT06sMvl6Ky_2hS-kFpY2aAdpHd3kaH_t3fz9kC0Rro";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('topbar-root').innerHTML = renderTopbar();
document.getElementById('header-root').innerHTML = renderHeader();
document.getElementById('footer-root').innerHTML = renderFooter();

// 2. Load User Profile
const user = JSON.parse(localStorage.getItem('cm_user')||'null');
if (user) {
  setTimeout(()=>{
    const cn = document.getElementById('cname'); if(cn) cn.value = user.name || '';
    const em = document.getElementById('email'); if(em) em.value = user.email || '';
  }, 100);
}

// 3. Wizard Navigation
function goStep(n) {
  const err = document.getElementById('post-err');
  if(err) err.style.display='none';
  if (n===2 && !document.getElementById('cat').value) {
    alert('Please select a category.'); return;
  }
  if (n===3) {
    if(!document.getElementById('title').value.trim()){alert('Please enter an ad title.');return;}
    if(!document.getElementById('price').value && document.getElementById('listing-type').value==='sell'){alert('Please enter a price.');return;}
    if(!document.getElementById('desc').value.trim()){alert('Please write a description.');return;}
    updatePreview();
  }
  for(let i=1;i<=4;i++){
    document.getElementById('step'+i).style.display = i===n?'block':'none';
    const d = document.getElementById('dot'+i);
    d.className = 'si-dot' + (i<n?' done':i===n?' active':'');
  }
}

// 4. Live Submission to Database
async function submitAd() {
  const err = document.getElementById('post-err');
  
  // Gather Data
  const adData = {
    title: document.getElementById('title').value,
    description: document.getElementById('desc').value,
    price: parseFloat(document.getElementById('price').value) || 0,
    category: document.getElementById('cat').value,
    listing_type: document.getElementById('listing-type').value,
    item_condition: document.getElementById('condition').value,
    zone: document.getElementById('zone').value,
    seller_name: document.getElementById('cname').value,
    seller_phone: document.getElementById('phone').value,
    seller_id: user ? user.id : 'anonymous' // Ensure you have user ID from login
  };

  // Basic Validation
  if(!adData.title || !adData.seller_name || !document.getElementById('terms').checked){
    err.textContent = "⚠️ Please fill in all required fields and agree to the terms.";
    err.style.display = 'block';
    return;
  }

  // Insert into Supabase
  const { data, error } = await supabaseClient
    .from('listings')
    .insert([adData]);

  if (error) {
    err.textContent = "❌ Error: " + error.message;
    err.style.display = 'block';
  } else {
    document.getElementById('success-overlay').style.display = 'flex';
  }
}

// ... (Keep your other helper functions like selType, updatePreview, etc.) ...
</script>
</body>
