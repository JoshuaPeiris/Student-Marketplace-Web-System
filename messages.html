<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — campusMarket</title>
<link rel="stylesheet" href="style.css"/>
<style>
.msg-layout{max-width:1140px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 180px);min-height:500px}
.convos{background:var(--card-bg);border:1px solid var(--border);border-radius:12px 0 0 12px;overflow:hidden;display:flex;flex-direction:column}
.convos-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between}
.convo-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.convo-search input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none}
.convo-list{overflow-y:auto;flex:1}
.convo-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .15s;position:relative}
.convo-item:hover{background:#f5f7fa}
.convo-item.active{background:#e8eaf6}
.convo-avatar{width:42px;height:42px;border-radius:50%;background:#e8eaf6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--primary);flex-shrink:0}
.convo-info{flex:1;min-width:0}
.convo-name{font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.convo-time{font-size:10px;color:var(--text-light);font-weight:400}
.convo-last{font-size:12px;color:var(--text-muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px}
.convo-item .unread{position:absolute;right:12px;bottom:14px;background:var(--orange);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.chat-panel{background:var(--card-bg);border:1px solid var(--border);border-left:none;border-radius:0 12px 12px 0;display:flex;flex-direction:column}
.chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-header .avatar{width:40px;height:40px;border-radius:50%;background:#e8eaf6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--primary)}
.chat-header .info .name{font-weight:700;font-size:14px}
.chat-header .info .meta{font-size:11px;color:var(--text-muted)}
.chat-header .actions{margin-left:auto;display:flex;gap:8px}
.listing-ref{background:#f0f4ff;border:1px solid #c5cae9;border-radius:8px;padding:10px 14px;margin:0 16px 10px;display:flex;align-items:center;gap:10px;font-size:12px;cursor:pointer}
.listing-ref .thumb{font-size:24px}
.listing-ref .details .title{font-weight:700;color:var(--primary)}
.listing-ref .details .price{color:var(--green);font-weight:700}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#fafbff}
.msg{max-width:70%;display:flex;flex-direction:column;gap:3px}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg .bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.msg.mine .bubble{background:var(--primary);color:#fff;border-radius:12px 12px 4px 12px}
.msg.theirs .bubble{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:12px 12px 12px 4px}
.msg .ts{font-size:10px;color:var(--text-light)}
.date-divider{text-align:center;font-size:11px;color:var(--text-light);margin:8px 0;display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.chat-input{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-input textarea{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;resize:none;max-height:100px;outline:none;font-family:inherit;transition:border-color .15s}
.chat-input textarea:focus{border-color:var(--primary)}
.chat-input button{padding:10px 18px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;transition:background .15s}
.chat-input button:hover{background:var(--primary-dark)}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:8px}
.empty-chat .ico{font-size:48px}
@media(max-width:700px){.msg-layout{grid-template-columns:1fr}.chat-panel{display:none}}
</style>
</head>
<body>
<div id="topbar-root"></div>
<div id="header-root"></div>

<div class="page-title-bar">
  <div style="max-width:1140px;margin:0 auto;width:100%">
    <h1>💬 Messages</h1>
  </div>
</div>

<div class="msg-layout">
  <div class="convos">
    <div class="convos-header">
      Conversations
      <span style="background:var(--orange);font-size:11px;padding:2px 8px;border-radius:10px">3 new</span>
    </div>
    <div class="convo-search"><input type="text" placeholder="Search conversations..."/></div>
    <div class="convo-list" id="convo-list"></div>
  </div>

  <div class="chat-panel" id="chat-panel">
    <div class="chat-header" id="chat-header">
      <div class="avatar" id="chat-avatar">KP</div>
      <div class="info">
        <div class="name" id="chat-name">Kamal Perera</div>
        <div class="meta" id="chat-meta">2nd Year · Active now</div>
      </div>
      <div class="actions">
        <button class="btn btn-outline btn-sm" onclick="viewProfile()">View Profile</button>
        <button class="btn btn-sm" style="background:#fce4ec;color:#c62828;border:none" onclick="if(confirm('Block this user?'))alert('User blocked.')">Block</button>
      </div>
    </div>

    <div class="listing-ref" id="listing-ref" onclick="window.location='listing-detail.html?id=1'">
      <div class="thumb">📚</div>
      <div class="details">
        <div class="title" id="ref-title">Programming in C++ Textbook</div>
        <div class="price" id="ref-price">Rs. 850</div>
      </div>
      <span style="margin-left:auto;font-size:11px;color:var(--primary);font-weight:600">View →</span>
    </div>

    <div class="chat-msgs" id="chat-msgs"></div>

    <div class="chat-input">
      <textarea id="msg-input" rows="1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<div id="footer-root"></div>
<script src="components.js"></script>
<script>
document.getElementById('topbar-root').innerHTML = renderTopbar();
document.getElementById('header-root').innerHTML = renderHeader();
document.getElementById('footer-root').innerHTML = renderFooter();

const CONVOS = [
  { id:1, name:'Kamal Perera', initials:'KP', year:'2nd Year', item:'C++ Textbook', price:'Rs. 850', last:"Is the book still available?", time:'2m', unread:2, listingId:1 },
  { id:2, name:'Nimal Silva', initials:'NS', year:'3rd Year', item:'USB-C Hub', price:'Rs. 2,200', last:"Can we meet at Block A tomorrow?", time:'1h', unread:1, listingId:2 },
  { id:3, name:'Amara Dias', initials:'AD', year:'2nd Year', item:'Past Papers', price:'Swap', last:"I have the OOP notes you wanted!", time:'3h', unread:0, listingId:3 },
  { id:4, name:'Sahan Weerasinghe', initials:'SW', year:'1st Year', item:'Drawing Set', price:'Rs. 550', last:"Thanks, I'll take it!", time:'1d', unread:0, listingId:4 },
  { id:5, name:'Dilshan Rajapaksha', initials:'DR', year:'2nd Year', item:'Batch Hoodie', price:'Rs. 1,400', last:"Do you have size L?", time:'2d', unread:0, listingId:5 },
];

const MSG_HISTORY = {
  1: [
    { mine:false, text:"Hi! Is the C++ textbook still available?", ts:"10:32 AM" },
    { mine:true, text:"Yes, it is! It's in good condition, just some light pencil marks.", ts:"10:35 AM" },
    { mine:false, text:"Great! What's the lowest you can go?", ts:"10:36 AM" },
    { mine:true, text:"I can do Rs. 800 if you come pick it up today at Block A.", ts:"10:40 AM" },
    { mine:false, text:"Is the book still available?", ts:"10:42 AM" },
  ],
  2: [
    { mine:false, text:"Hello, I'm interested in your USB-C Hub.", ts:"9:00 AM" },
    { mine:true, text:"Sure! It's like new, used only 2 months.", ts:"9:05 AM" },
    { mine:false, text:"Can we meet at Block A tomorrow?", ts:"9:08 AM" },
  ],
};

let activeConvo = 1;
function renderConvos() {
  document.getElementById('convo-list').innerHTML = CONVOS.map(c =>
    `<div class="convo-item ${c.id===activeConvo?'active':''}" onclick="openConvo(${c.id})">
      <div class="convo-avatar">${c.initials}</div>
      <div class="convo-info">
        <div class="convo-name">${c.name}<span class="convo-time">${c.time}</span></div>
        <div class="convo-last">${c.last}</div>
      </div>
      ${c.unread?`<span class="unread">${c.unread}</span>`:''}
    </div>`).join('');
}

function openConvo(id) {
  activeConvo = id;
  const c = CONVOS.find(x=>x.id===id);
  document.getElementById('chat-avatar').textContent = c.initials;
  document.getElementById('chat-name').textContent = c.name;
  document.getElementById('chat-meta').textContent = c.year + ' · Active recently';
  document.getElementById('ref-title').textContent = c.item;
  document.getElementById('ref-price').textContent = c.price;
  renderMsgs(id);
  renderConvos();
  CONVOS.find(x=>x.id===id).unread = 0;
}

function renderMsgs(id) {
  const msgs = MSG_HISTORY[id] || [];
  const container = document.getElementById('chat-msgs');
  let html = `<div class="date-divider">Today</div>`;
  msgs.forEach(m => {
    html += `<div class="msg ${m.mine?'mine':'theirs'}">
      <div class="bubble">${m.text}</div>
      <div class="ts">${m.ts}</div>
    </div>`;
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  const msgs = MSG_HISTORY[activeConvo] = MSG_HISTORY[activeConvo] || [];
  const now = new Date();
  const ts = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes()+' '+(now.getHours()<12?'AM':'PM');
  msgs.push({ mine:true, text, ts });
  CONVOS.find(x=>x.id===activeConvo).last = text;
  input.value = '';
  renderMsgs(activeConvo);
  renderConvos();
  setTimeout(()=>{
    const replies = ["Got it! Let's meet at the library?","Sure, sounds good!","Can you hold it for tomorrow?","Is there any discount?","Perfect, I'll come by in the afternoon."];
    msgs.push({ mine:false, text:replies[Math.floor(Math.random()*replies.length)], ts });
    renderMsgs(activeConvo);
  }, 1500);
}

function viewProfile() {
  window.location.href = 'profile.html';
}

renderConvos();
openConvo(1);
const params = new URLSearchParams(location.search);
if (params.get('to')) {
  document.getElementById('chat-name').textContent = decodeURIComponent(params.get('to'));
}
</script>
</body>
</html>
